{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <h2 class="form-page-title">Editar entrada</h2>

        <form action="/blog/{{ blog[6] }}/editar/{{ blog[0] }}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control form-input" name="title" value="{{ blog[2] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <input type="text" class="form-control form-input" name="description" value="{{ blog[3] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Imagen</label>
                <input type="text" class="form-control form-input" name="img" value="{{ blog[4] }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Ruta (URL)</label>
                <input type="text" class="form-control form-input" name="url" value="{{ blog[6] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Audio</label>
                <input type="file" accept="audio/*" name="song" class="form-file">
                <p class="form-hint">Deja vacío para mantener el audio actual</p>
            </div>
            <div class="mb-3">
                <label class="form-label">Contenido</label>
                <textarea name="blog">{{ blog[7] }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-gold">Actualizar</button>
                <a href="/" class="btn btn-outline">Volver</a>
            </div>
        </form>
    </div>
</div>

<script>
    CKEDITOR.replace('blog');
</script>
{% endblock %}
