{% extends "layout.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <h2 class="text-3xl text-white font-serif mb-6 font-normal">Editar entrada</h2>

    <form action="/blog/{{ blog[6] }}/editar/{{ blog[0] }}" method="post" enctype="multipart/form-data">
        <div class="mb-4">
            <label class="block text-white/70 text-sm font-serif mb-1.5">Título</label>
            <input type="text" name="title" value="{{ blog[2] }}" required
                   class="w-full bg-white/[0.05] border border-white/10 text-white rounded px-4 py-2.5 font-serif text-sm transition focus:bg-white/10 focus:border-gold/40 focus:ring-2 focus:ring-gold/10 outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-white/70 text-sm font-serif mb-1.5">Descripción</label>
            <input type="text" name="description" value="{{ blog[3] }}" required
                   class="w-full bg-white/[0.05] border border-white/10 text-white rounded px-4 py-2.5 font-serif text-sm transition focus:bg-white/10 focus:border-gold/40 focus:ring-2 focus:ring-gold/10 outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-white/70 text-sm font-serif mb-1.5">Imagen</label>
            <input type="text" name="img" value="{{ blog[4] }}"
                   class="w-full bg-white/[0.05] border border-white/10 text-white rounded px-4 py-2.5 font-serif text-sm transition focus:bg-white/10 focus:border-gold/40 focus:ring-2 focus:ring-gold/10 outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-white/70 text-sm font-serif mb-1.5">Ruta (URL)</label>
            <input type="text" name="url" value="{{ blog[6] }}" required
                   class="w-full bg-white/[0.05] border border-white/10 text-white rounded px-4 py-2.5 font-serif text-sm transition focus:bg-white/10 focus:border-gold/40 focus:ring-2 focus:ring-gold/10 outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-white/70 text-sm font-serif mb-1.5">Audio</label>
            <input type="file" accept="audio/*" name="song"
                   class="w-full text-white/60 text-sm font-serif file:bg-gold/10 file:border file:border-gold/20 file:text-gold file:px-4 file:py-1.5 file:rounded file:cursor-pointer file:font-serif file:text-sm file:mr-3 file:transition hover:file:bg-gold/20">
            <p class="text-white/30 text-xs font-serif mt-1">Deja vacío para mantener el audio actual</p>
        </div>
        <div class="mb-4">
            <label class="block text-white/70 text-sm font-serif mb-1.5">Contenido</label>
            <textarea name="blog">{{ blog[7] }}</textarea>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-gradient-to-br from-gold to-gold-dark text-[#1a1a1a] font-bold px-8 py-2.5 rounded text-sm font-serif transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg hover:from-gold-light hover:to-gold border-0 cursor-pointer">Actualizar</button>
            <a href="/" class="inline-block text-white/60 border border-white/20 rounded px-8 py-2.5 text-sm font-serif no-underline transition hover:text-white hover:border-white/30">Volver</a>
        </div>
    </form>
</div>

<script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
<script>CKEDITOR.replace('blog');</script>
{% endblock %}
