{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <h2 class="form-page-title">Nueva entrada</h2>

        <form action="/blog/nuevo-blog" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control form-input" name="title"
                       placeholder="Título de la entrada" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <input type="text" class="form-control form-input" name="description"
                       placeholder="Breve descripción" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Imagen</label>
                <input type="text" class="form-control form-input" name="img"
                       placeholder="URL de la imagen">
            </div>
            <div class="mb-3">
                <label class="form-label">Ruta (URL)</label>
                <input type="text" class="form-control form-input" name="url"
                       placeholder="titulo-separado-por-guiones" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Audio</label>
                <input type="file" accept="audio/*" name="song" class="form-file" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contenido</label>
                <textarea name="blog"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-gold">Guardar</button>
                <a href="/" class="btn btn-outline">Volver</a>
            </div>
        </form>
    </div>
</div>

<script>
    CKEDITOR.replace('blog');
</script>
{% endblock %}
