{% extends "layout.html" %}

{% block content %}
<article class="max-w-3xl w-full mx-auto py-6 px-0 sm:px-4 text-white/90 overflow-hidden">
    {% if blog[7] %}
    <audio src="{{ url_for('static', filename='songs/' + blog[7]) }}" autoplay hidden></audio>
    {% endif %}

    <div class="text-center mb-8">
        <h1 class="text-3xl sm:text-4xl text-white font-serif font-normal leading-tight mb-3">{{ blog[0] }}</h1>
        <div class="flex items-center justify-center gap-3 flex-wrap text-sm text-white/40 font-serif">
            <span class="text-gold">Por <strong>{{ blog[1] }}</strong></span>
        </div>
    </div>

    <hr class="border-0 h-px max-w-[250px] mx-auto mb-6" style="background: linear-gradient(90deg, transparent, rgba(212,175,55,0.12), transparent);">

    {% if blog[5] %}
    <div class="w-full flex justify-center mb-8">
        <img src="{{ blog[5] }}" alt="" class="max-w-full h-auto rounded shadow-2xl">
    </div>
    {% endif %}

    <div id="entrada" class="text-[16px] sm:text-[19px] leading-[1.8] sm:leading-[1.9] font-serif">{{ blog[3] | safe }}</div>
</article>
{% endblock %}
